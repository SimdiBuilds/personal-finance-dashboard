<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder {
      text-align: center;
      padding: 2rem;
    }

    .placeholder h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }

    .placeholder p {
      font-size: 1rem;
      color: #64748b;
    }

    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 99px;
    }
  </style>
</head>
<body>
  <div class="placeholder">
    <h1>Finance Dashboard</h1>
    <p>Server is running. Dashboard UI coming soon.</p>
    <span class="badge">FastAPI + pandas + Chart.js</span>
  </div>
</body>
</html>
